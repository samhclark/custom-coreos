global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'victoriametrics'
    static_configs:
      - targets: ['127.0.0.1:8428']

  - job_name: 'garage'
    bearer_token_file: /run/secrets/garage-metrics-token
    static_configs:
      - targets: ['127.0.0.1:3903']

  - job_name: 'caddy'
    static_configs:
      - targets: ['127.0.0.1:2019']

  - job_name: 'node'
    static_configs:
      - targets: ['127.0.0.1:9100']

  - job_name: 'vmalert'
    static_configs:
      - targets: ['127.0.0.1:8880']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['127.0.0.1:9093']
