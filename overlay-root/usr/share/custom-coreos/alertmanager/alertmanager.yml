# ABOUTME: Alertmanager routing configuration using runtime secret files.

route:
  receiver: pushover
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: pushover
    pushover_configs:
      - user_key_file: /run/secrets/pushover-user-key
        token_file: /run/secrets/pushover-api-token
        priority: '0'
        title: 'NAS Alert: {{ .GroupLabels.alertname }}'
        message: '{{ range .Alerts }}{{ .Annotations.summary }}{{ "\n" }}{{ end }}'
