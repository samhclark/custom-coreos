# Rootless Grafana uses a namespaced host account so the service identity does
# not collide with upstream image defaults.
d /var/lib/grafana 0750 _nas_grafana _nas_grafana -
Z /var/lib/grafana 0750 _nas_grafana _nas_grafana -
d /var/home/_nas_grafana 0750 _nas_grafana _nas_grafana -
d /var/home/_nas_grafana/.config 0750 _nas_grafana _nas_grafana -
d /var/home/_nas_grafana/.config/containers 0750 _nas_grafana _nas_grafana -
d /var/home/_nas_grafana/.local 0750 _nas_grafana _nas_grafana -
d /var/home/_nas_grafana/.local/share 0750 _nas_grafana _nas_grafana -
d /var/home/_nas_grafana/.local/share/containers 0750 _nas_grafana _nas_grafana -
d /var/home/_nas_grafana/.cache 0750 _nas_grafana _nas_grafana -
d /var/lib/systemd/linger 0755 root root -
f /var/lib/systemd/linger/_nas_grafana 0644 root root -
