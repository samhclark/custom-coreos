# Rootless vmalert uses a namespaced host account so the service identity does
# not collide with upstream image defaults.
d /var/home/_nas_vmalert 0750 _nas_vmalert _nas_vmalert -
d /var/home/_nas_vmalert/.config 0750 _nas_vmalert _nas_vmalert -
d /var/home/_nas_vmalert/.config/containers 0750 _nas_vmalert _nas_vmalert -
d /var/home/_nas_vmalert/.local 0750 _nas_vmalert _nas_vmalert -
d /var/home/_nas_vmalert/.local/share 0750 _nas_vmalert _nas_vmalert -
d /var/home/_nas_vmalert/.local/share/containers 0750 _nas_vmalert _nas_vmalert -
d /var/home/_nas_vmalert/.cache 0750 _nas_vmalert _nas_vmalert -
d /var/lib/systemd/linger 0755 root root -
f /var/lib/systemd/linger/_nas_vmalert 0644 root root -
