# Rootless blackbox exporter uses a namespaced host account so the service
# identity does not collide with upstream image defaults.
d /var/home/_nas_blackbox 0750 _nas_blackbox _nas_blackbox -
d /var/home/_nas_blackbox/.config 0750 _nas_blackbox _nas_blackbox -
d /var/home/_nas_blackbox/.config/containers 0750 _nas_blackbox _nas_blackbox -
d /var/home/_nas_blackbox/.local 0750 _nas_blackbox _nas_blackbox -
d /var/home/_nas_blackbox/.local/share 0750 _nas_blackbox _nas_blackbox -
d /var/home/_nas_blackbox/.local/share/containers 0750 _nas_blackbox _nas_blackbox -
d /var/home/_nas_blackbox/.cache 0750 _nas_blackbox _nas_blackbox -
d /var/lib/systemd/linger 0755 root root -
f /var/lib/systemd/linger/_nas_blackbox 0644 root root -
