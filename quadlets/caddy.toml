# ABOUTME: Declarative config for the rootless Caddy Quadlet; persistent state
# is prepared once by prepare-caddy-rootless-state.service.

[service]
name = "caddy"
description = "Caddy Reverse Proxy"
documentation = "https://caddyserver.com/docs/"

[host]
username = "_nas_caddy"
uid = 51310
subid-start = 513100000
display-name = "Caddy"

[container]
image = "ghcr.io/samhclark/lab-caddy:2.11.3-cf-0.2.4"
network = "host"
auto-update = "registry"
container-user = 0
pull = "always"

[[container.volumes]]
comment = "Image-controlled configuration (read-only)"
source = "/usr/share/custom-coreos/caddy/Caddyfile"
target = "/etc/caddy/Caddyfile"
options = "ro"

[[container.volumes]]
comment = "Persistent certificate and ACME state; ownership and SELinux labels are prepared by the host unit"
source = "/var/lib/caddy"
target = "/data"

[[container.volumes]]
comment = "Persistent Caddy runtime configuration state; ownership and SELinux labels are prepared by the host unit"
source = "/var/lib/caddy-config"
target = "/config"

[[container.secrets]]
name = "cf-api-token"

[assets]
path = "/usr/share/custom-coreos/caddy"

[unit.extra]
# The one-time host migration and the user manager intentionally have no
# cross-manager ordering. The durable marker means the one-shot completed its
# strict ownership and SELinux verification. These simple access checks fail
# closed during a first-boot race, and Restart=always retries afterward.
Service = [
    '''ExecStartPre=/usr/bin/bash -lc 'if [[ -e /etc/containers/systemd/caddy.container ]]; then echo "Refusing to start while the retired rootful Caddy Quadlet still exists" >&2; exit 1; fi'''',
    '''ExecStartPre=/usr/bin/test -e /var/lib/nas-migrations/caddy-rootless-ownership-v1/complete''',
    "ExecStartPre=/usr/bin/test -w /var/lib/caddy",
    "ExecStartPre=/usr/bin/test -w /var/lib/caddy-config",
]
