# ABOUTME: Declarative config for the rootless vmalert quadlet; consumed by
# generate-quadlets.py (build time) and sops-distribute-secrets.sh (boot time).

[service]
name = "vmalert"
description = "VictoriaMetrics vmalert - Alerting Rules Evaluator"
documentation = "https://docs.victoriametrics.com/vmalert/"

[host]
username = "_nas_vmalert"
uid = 51220
subid-start = 512200000
display-name = "vmalert"

[container]
image = "docker.io/victoriametrics/vmalert:v1.139.0"
network = "host"
exec = "-datasource.url=http://127.0.0.1:8428 -remoteWrite.url=http://127.0.0.1:8428 -remoteRead.url=http://127.0.0.1:8428 -notifier.url=http://127.0.0.1:9093 -rule=/etc/vmalert/alert-rules.yml -httpListenAddr=127.0.0.1:8880"

[[container.volumes]]
comment = "Image-controlled alerting rules (read-only)"
source = "/usr/share/custom-coreos/vmalert"
target = "/etc/vmalert"
options = "ro"

[assets]
path = "/usr/share/custom-coreos/vmalert"

[unit]
timeout-start-sec = 330

[unit.extra]
# Rootless user services must not depend on system units; wait for the local
# VictoriaMetrics to answer instead (bounded readiness loop, 300s budget).
Service = [
    '''ExecStartPre=/usr/bin/bash -lc 'for i in {1..150}; do /usr/bin/curl -fsS http://127.0.0.1:8428/-/healthy >/dev/null 2>&1 && exit 0; sleep 2; done; echo "VictoriaMetrics did not become ready on 127.0.0.1:8428 within 300 seconds" >&2; exit 1'''',
]
