# ABOUTME: Declarative config for the rootless blackbox exporter quadlet;
# consumed by generate-quadlets.py (build time) and sops-distribute-secrets.sh
# (boot time).

[service]
name = "blackbox-exporter"
description = "Prometheus Blackbox Exporter"
documentation = "https://github.com/prometheus/blackbox_exporter"

[host]
username = "_nas_blackbox"
uid = 51230
subid-start = 512300000
display-name = "blackbox exporter"

[container]
image = "quay.io/prometheus/blackbox-exporter:v0.28.0@sha256:e753ff9f3fc458d02cca5eddab5a77e1c175eee484a8925ac7d524f04366c2fc"
network = "host"
auto-update = "registry"
exec = "--config.file=/config/blackbox.yml --web.listen-address=127.0.0.1:9115"

[[container.volumes]]
comment = "Image-controlled local probe configuration (read-only)"
source = "/usr/share/custom-coreos/blackbox-exporter"
target = "/config"
options = "ro"

[assets]
path = "/usr/share/custom-coreos/blackbox-exporter"
